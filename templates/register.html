{% set hide_navbar = True %}
{% extends "layout.html" %}

{% block content %}
<style>
  /* Flex parent wrapper to center the card dead-center on the screen */
  .page-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 85vh;
  }

  /* Your main container matching the dark panel look */
  .main_container {
    background-color: #0d6efd; /* Dark panel background */
    border-radius: 8px;
    width: 450px;
    padding: 40px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.979);
    color: #ffffff;
  }

  /* Input fields custom styling to match the reference look */
  .form-control-custom {
    background-color: #acb9d3 !important;
    border: 1px solid #000000 !important;
    color: #000000 !important;
    padding: 12px;
  }

  .form-control-custom::placeholder {
    color: #c5d6ec;
  }

  /* Label text color adjustments */
  .form-label-custom {
    color: #e2e8f0;
    font-weight: 500;                                             
    margin-bottom: 8px;
  }

  /* Custom styling for your specific buttons */
  .btn-signin {
    background-color: #00e1ff80; /* Keeping your cyan/blue choice */
    border: none;
    color: white;
    padding: 12px;
    font-weight: bold;
    font-size: 16px;
    border-radius: 6px;
  }

  .btn-signin:hover {
    background-color: #07dffc;
  }

  .btn-google-custom {
    background-color: transparent;
    border: 1px solid #4a5568;
    color: white;
    padding: 12px;
    border-radius: 6px;
    font-weight: 500;
  }

  .btn-google-custom:hover {
    background-color: rgba(255, 255, 255, 0.267);
  }

  /* Divider rule */
  .divider {
    border-top: 1px solid #4a5568;
    margin: 25px 0;
  }
</style>

<div class="page-wrapper">
  <div class="main_container">
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show" role="alert" style="color: #000;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form method="POST">
      <div class="mb-4">
        <label for="reg_name" class="form-label form-label-custom">Full Name</label>
        <input type="text" class="form-control form-control-custom" id="reg_name" name="name" placeholder="📝 Enter your full name" required>
      </div>

      <div class="mb-4">
        <label for="reg_email" class="form-label form-label-custom">Email address</label>
        <input type="email" class="form-control form-control-custom" id="reg_email" name="email" placeholder="👤 Enter your email address" required>
      </div>

      <div class="mb-4">
        <label for="reg_password" class="form-label form-label-custom">Password</label>
        <input type="password" class="form-control form-control-custom" id="reg_password" name="password" placeholder="🔒 Create a password" required>
      </div>

      <div class="mb-4">
        <label for="confirm_password" class="form-label form-label-custom">Confirm Password</label>
        <input type="password" class="form-control form-control-custom" id="confirm_password" name="confirm_password" placeholder="🔒 Confirm your password" required>
      </div>

      <div class="mb-4">
        <label for="user_role" class="form-label form-label-custom">Register As</label>
        <select class="form-control form-control-custom" id="user_role" name="role" required style="cursor: pointer;">
          <option value="" disabled selected hidden>🚲 Choose your role...</option>
          <option value="seller" style="color: #000000;">Store Seller / Merchant</option>
          <option value="rider" style="color: #000000;">Delivery Rider</option>
        </select>
      </div>

      <div class="mb-4 d-flex justify-content-between align-items-center">
        <div class="form-check m-0 d-flex align-items-center">
          <input type="checkbox" class="form-check-input me-2" id="terms" style="cursor: pointer;" required>
          <label class="form-check-label" for="terms" style="color: #cbd5e1; cursor: pointer;">I agree to terms</label>
        </div>
        <a href="{{ url_for('login') }}" style="text-decoration: none; color: rgba(255, 255, 255, 0.8); font-weight: 500; font-size: 0.9rem;">Already have an account?</a>
      </div>

      <button type="submit" class="btn btn-signin w-100 d-flex align-items-center justify-content-center gap-2">
        <span>➕</span> Sign Up
      </button>

      <div class="divider"></div>

      <button type="button" class="btn btn-google-custom w-100 d-flex align-items-center justify-content-center gap-2">
        <span style="color: rgb(231, 231, 231); font-weight: bold;">G</span> Sign up with Google
      </button>
    </form>

  </div>
</div>
{% endblock %}
