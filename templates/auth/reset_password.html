<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Nairobi Delivery App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1 0 auto;
        }
        .reset-card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-primary shadow-sm">
        <div class="container justify-content-center">
            <span class="navbar-brand mb-0 h1 fs-6 fw-bold text-muted">MJ-Delivery App Platform</span>
        </div>
    </nav>

    <main class="container d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow-sm reset-card p-4 bg-body-secondary">
                    <div class="card-body">
                        
                        <div class="text-center mb-4">
                            <div class="text-success mb-2">
                                <i class="bi bi-key-fill display-4 text-warning"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-1">Create New Password</h2>
                            <p class="text-muted small">Set up your brand-new account access password keys below.</p>
                        </div>

                        <form action="/auth/reset-password" method="POST" onsubmit="return validatePasswordsMatch()">
                            
                            <div class="mb-3">
                                <label for="new_password" class="form-label fw-semibold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="new_password" name="password" placeholder="Minimum 6 characters" minlength="6" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-semibold">Confirm New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-shield-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-enter your password choice" required>
                                </div>
                                <div class="form-text small text-danger d-none" id="match-error-msg">
                                    <i class="bi bi-x-circle-fill me-1"></i> Passwords do not match! Please check again.
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning py-2.5 fw-bold text-dark shadow-sm">
                                    <i class="bi bi-check-all me-1"></i> Update & Save Password
                                </button>
                            </div>
                            
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container text-muted small">
            &copy; 2026 Nairobi Delivery App. Secure Password Engine Console.
        </div>
    </footer>

    <script>
        function validatePasswordsMatch() {
            const pass = document.getElementById('new_password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('match-error-msg');

            if (pass !== confirmPass) {
                errorDiv.classList.remove('d-none'); // Reveal the matching warning log text
                return false; // Prevent form from submitting to main.py
            }
            errorDiv.classList.add('d-none');
            return true;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
