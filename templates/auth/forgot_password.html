<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Nairobi Delivery App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1 0 auto;
        }
        .recovery-card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-primary shadow-sm">
        <div class="container">
            <button class="btn btn-outline-dark btn-sm fw-semibold" onclick="history.back()">
                <i class="bi bi-arrow-left me-1"></i> Back
            </button>
            <span class="navbar-brand mb-0 h1 fs-6 text-muted">Account Recovery Node</span>
        </div>
    </nav>

    <main class="container d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow-sm recovery-card p-4 bg-body-secondary">
                    <div class="card-body">
                        
                        <div class="text-center mb-4">
                            <div class="text-primary mb-2">
                                <i class="bi bi-shield-exclamation display-4 text-secondary"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-1">Forgot Password?</h2>
                            <p class="text-muted small">No worries! Enter your registered account email, and we will send you a reset link instructions bundle.</p>
                        </div>

                        <form action="/auth/forgot-password" method="POST">
                            
                            <div class="mb-4">
                                <label for="recovery_email" class="form-label fw-semibold">Your Registered Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="recovery_email" name="email" placeholder="e.g., username@domain.com" required autocomplete="email">
                                </div>
                                <div class="form-text small text-muted">Make sure to provide the email profile associated with your driver or shop account setup.</div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark py-2.5 fw-bold shadow-sm">
                                    <i class="bi bi-envelope-paper-fill me-2"></i> Send Recovery Link
                                </button>
                                <button type="button" class="btn btn-light py-2 text-muted fw-semibold small" onclick="history.back()">Cancel</button>
                            </div>
                            
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container text-muted small">
            &copy; 2026 Nairobi Delivery App. Account Support Network.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
