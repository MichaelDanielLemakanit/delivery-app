<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Login - Nairobi Delivery App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1 0 auto;
        }

        .login-card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-light bg-success shadow-sm">
        <div class="container">
            <a class="btn btn-outline-dark btn-sm fw-semibold" href="/">
                <i class="bi bi-arrow-left me-1"></i>Home
            </a>
            <span class="navbar-brand mb-0 h1 fs-6 text-muted">Mj-Delivery App</span>
        </div>
    </nav>

    <main class="container d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">


                <div class="card shadow-sm login-card p-4 bg-body-secondary">
                    <div class="card-body">

                        <div class="text-center mb-4">
                            <div class="text-success mb-2">
                                <i class="bi bi-bicycle display-4"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-1">Rider Login</h2>
                            <p class="text-muted small">Access your dispatch dashboard to view live jobs across Nairobi.
                            </p>
                        </div>

                        <form action="/auth/rider/login" method="POST">

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i
                                            class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email"
                                        placeholder="e.g., michael@gmail.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password"
                                        placeholder="Enter your password" required>
                                </div>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-success py-2.5 fw-bold shadow-sm">
                                    <a href="dashboard.html"> <i class="bi bi-box-arrow-in-right me-2"></i> Sign In to
                                        Work</a>
                                </button>
                            </div>

                        </form>

                        <div class="text-center mt-3">
                            <span class="text-muted small">New rider? </span>
                            <a href="/auth/rider/register"
                                class="link-success small fw-bold text-decoration-none">Create an Account Here</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>


    <footer class="bg-success text-white text-center py-3 mt-auto">
        <div class="container text-muted small">
            &copy; 2026 Nairobi Delivery App. Logistics Authentication Node.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
