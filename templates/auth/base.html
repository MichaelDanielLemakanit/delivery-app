<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MJ-Delivery App{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1 0 auto;
        }
        /* Custom Timeline styling globally available */
        .tracking-card {
            border-radius: 12px;
            border: none;
        }
        .timeline {
            position: relative;
            padding-left: 3rem;
            list-style: none;
        }
        .timeline::before {
            content: "";
            position: absolute;
            left: 1.25rem;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: #e9ecef;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 2.5rem;
        }
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        .timeline-icon {
            position: absolute;
            left: -2.35rem;
            top: 0;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            background-color: #fff;
            border: 3px solid #6c757d;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timeline-item.completed .timeline-icon {
            border-color: #198754;
            background-color: #198754;
            color: #fff;
        }
        .timeline-item.active .timeline-icon {
            border-color: #ffc107;
            background-color: #fff;
            color: #ffc107;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-primary shadow-sm">
        <div class="container">
            <a class="btn btn-outline-dark btn-sm fw-semibold" href="/auth/customer/login.html">
                <i class="bi bi-box-arrow-left me-1"></i> Exit page
            </a>
            <span class="navbar-brand mb-0 h1 fs-6 text-dark fw-bold">MJ-Delivery App</span>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="bg-primary text-white text-center py-3 mt-auto">
        <div class="container text-white-50 small">
            &copy; 2026 Nairobi Delivery App. Live Package Tracking Workspace.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
